#
#  project.yml — XcodeGen spec for Sofra
#
#  Regenerate the .xcodeproj after changing this file (or adding/removing sources):
#      xcodegen generate
#
#  Both project.yml and the generated Sofra.xcodeproj are committed, so the app can
#  be opened directly without XcodeGen installed.
#

name: Sofra

options:
  bundleIdPrefix: com.fatih
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: tr
  groupSortPosition: top

# Swift Package Manager dependencies.
# - Pow: SwiftUI micro-effect + transition library (EmergeTools). Used in LogButton
#   for haptic feedback + checkmark particle burst on successful log. iOS 15+.
# - Lottie: vector animation renderer. Used in paywall/empty-state hero. iOS 13+.
#   (Phase 2 — only declared here, no consumer yet, comment kept to track the plan.)
#
# Lottie SPM pin: use the precompiled `lottie-spm` mirror (8MB), NOT the main
# `airbnb/lottie-ios` repo (300+MB) — SPM would otherwise download the full
# git history every resolve.
packages:
  Pow:
    url: https://github.com/EmergeTools/Pow
    from: 1.0.5
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    branch: main

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"                 # Swift 5 language mode — avoids strict-concurrency churn this phase
    DEVELOPMENT_TEAM: ""                 # set your Apple Developer team here to sign + enable CloudKit
    SWIFT_EMIT_LOC_STRINGS: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Sofra:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sofra
        excludes:
          - "**/*.md"                    # keep the Fonts drop-in README out of the bundle
          - "Info.plist"                 # referenced via INFOPLIST_FILE, not a bundle resource
          - "Secrets.plist"              # local OpenAI key must never ship inside the app bundle
          - "*.entitlements"             # referenced via CODE_SIGN_ENTITLEMENTS
    settings:
      base:
        PRODUCT_NAME: Sofra
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.sofra
        INFOPLIST_FILE: Sofra/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sofra/Sofra.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"      # iPhone
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SofraWidgetExtension
      - package: Pow
        product: Pow
      - package: Lottie
        product: Lottie
    # Explicit scheme so `xcodegen generate` always emits a shared "Sofra" app
    # scheme. Without it Xcode auto-creates schemes on open and may default to
    # the widget extension — building the widget instead of the app on device.
    scheme:
      testTargets:
        - SofraTests
      gatherCoverageData: false
      # Local StoreKit testing: products + the annual 7-day free trial resolve
      # from this config in the simulator (no App Store Connect round-trip).
      # Production reads the real products from App Store Connect regardless.
      storeKitConfiguration: Sofra/StoreKit/Products.storekit

  SofraTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SofraTests
    dependencies:
      - target: Sofra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.sofra.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"

  SofraWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SofraWidget
      - path: Sofra/Models/WidgetDailySummary.swift
      - path: Sofra/Models/WidgetDataStore.swift
      - path: Sofra/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: "Sofra Widget"
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.sofra.widget
        INFOPLIST_FILE: SofraWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: SofraWidget/SofraWidget.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"      # iPhone
        CODE_SIGN_STYLE: Automatic
