#
#  project.yml — XcodeGen spec for Calp
#
#  Regenerate the .xcodeproj after changing this file (or adding/removing sources):
#      xcodegen generate
#
#  Both project.yml and the generated Calp.xcodeproj are committed, so the app can
#  be opened directly without XcodeGen installed.
#

name: Calp

options:
  bundleIdPrefix: com.fatih
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: tr
  groupSortPosition: top

# Swift Package Manager dependencies.
# - Pow: SwiftUI micro-effect + transition library (EmergeTools). Used in LogButton
#   for haptic feedback + checkmark particle burst on successful log. iOS 15+.
# - Lottie: vector animation renderer. Used in paywall/empty-state hero. iOS 13+.
#   (Phase 2 — only declared here, no consumer yet, comment kept to track the plan.)
#
# Lottie SPM pin: use the precompiled `lottie-spm` mirror (8MB), NOT the main
# `airbnb/lottie-ios` repo (300+MB) — SPM would otherwise download the full
# git history every resolve.
packages:
  Pow:
    url: https://github.com/EmergeTools/Pow
    from: 1.0.5
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    branch: main

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8XPP7Z37GF"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Calp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Calp
        excludes:
          - "**/*.md"
          - "Info.plist"
          - "Secrets.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_NAME: Calp
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.calp
        INFOPLIST_FILE: Calp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Calp/Calp.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Calp reads weight, height, active energy, and steps to personalize your nutrition view."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Calp writes meal calories and macros to Health."
    dependencies:
      - target: CalpWidgetExtension
      - package: Pow
        product: Pow
      - package: Lottie
        product: Lottie
    scheme:
      testTargets:
        - CalpTests
      gatherCoverageData: false
      storeKitConfiguration: Calp/StoreKit/Products.storekit

  CalpTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CalpTests
    dependencies:
      - target: Calp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.calp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"

  CalpWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CalpWidget
      - path: Calp/Models/WidgetDailySummary.swift
      - path: Calp/Models/WidgetDataStore.swift
      - path: Calp/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: "Calp Widget"
        PRODUCT_BUNDLE_IDENTIFIER: com.fatih.calp.widget
        INFOPLIST_FILE: CalpWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CalpWidget/CalpWidget.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
